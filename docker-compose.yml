services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    command: npm run start
    restart: unless-stopped

  scheduler:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: npm run worker
    restart: unless-stopped

